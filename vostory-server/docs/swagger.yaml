        description: 岗位编码
        type: string
      post_name:
        description: 岗位名称
        type: string
      post_sort:
        description: 显示顺序
        type: integer
      remark:
        description: 备注
        type: string
      status:
        description: 状态（0正常 1停用）
        type: string
    required:
