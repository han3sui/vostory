    - post_code
    - post_name
    - status
    type: object
  iot-alert-center_api_v1.SysRoleCreateRequest:
    properties:
      data_scope:
        description: 数据范围
        type: string
      data_scope_ids:
        description: 数据范围ID,关联sys_dept表
        items:
          type: integer
        type: array
      remark:
        description: 备注
        type: string
      role_key:
        description: 角色权限字符串
        type: string
      role_name:
        description: 角色名称
        type: string
      role_sort:
        description: 显示顺序
        type: integer
      status:
        description: 角色状态（0正常 1停用）
        type: string
    required:
    - data_scope
    - role_key
    - role_name
    - role_sort
    - status
    type: object
  iot-alert-center_api_v1.SysRoleMenuUpdateRequest:
    properties:
      menu_ids:
        description: 菜单ID列表
        items:
          type: integer
        type: array
      role_id:
        description: 角色ID
        type: integer
    required:
    - menu_ids
    - role_id
    type: object
  iot-alert-center_api_v1.SysUserChangeStatusRequest:
    properties:
      status:
        type: string
      user_id:
        type: integer
    required:
    - status
    - user_id
    type: object
  iot-alert-center_api_v1.SysUserCreateRequest:
    properties:
      avatar:
        description: 头像路径
        type: string
      dept_id:
        description: 部门ID
        type: integer
      email:
        description: 用户邮箱
        type: string
      login_name:
        description: 登录账号
        type: string
      password:
        description: 密码
        type: string
      phonenumber:
        description: 手机号码
        type: string
      post_ids:
        description: 岗位ID列表
        items:
          type: integer
        type: array
      remark:
        description: 备注
        type: string
      role_ids:
        description: 角色ID列表
        items:
          type: integer
        type: array
      sex:
        description: 用户性别
        type: string
      status:
        description: 账号状态
        type: string
      user_name:
        description: 用户昵称
        type: string
      user_type:
        description: 用户类型
        type: string
    required:
    - login_name
    - password
    - status
    - user_name
    type: object
  iot-alert-center_api_v1.SysUserLoginRequest:
    properties:
      login_name:
        type: string
      password:
        type: string
    required:
    - login_name
    - password
    type: object
  iot-alert-center_api_v1.SysUserResetPasswordRequest:
    properties:
      new_password:
        type: string
      user_id:
        type: integer
    required:
    - new_password
    - user_id
    type: object
  iot-alert-center_api_v1.SysUserUpdatePasswordRequest:
    properties:
      password:
        type: string
    required:
    - password
    type: object
