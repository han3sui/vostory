definitions:
  iot-alert-center_api_v1.MenuPerms:
    properties:
      menu_name:
        description: 菜单名称
        type: string
      parent_id:
        description: 父菜单ID
        type: integer
      perms:
        description: 权限标识
        type: string
    type: object
  iot-alert-center_api_v1.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  iot-alert-center_api_v1.SysDeptCreateRequest:
    properties:
      dept_name:
        description: 部门名称
        type: string
      email:
        description: 邮箱
        type: string
      leader:
        description: 负责人
        type: string
      order_num:
        description: 显示顺序
        type: integer
      parent_id:
        description: 父部门ID
        type: integer
      phone:
        description: 联系电话
        type: string
      remark:
        description: 备注
        type: string
      status:
        description: 部门状态（0正常 1停用）
        type: string
    required:
    - dept_name
    - order_num
    - parent_id
    - status
    type: object
  iot-alert-center_api_v1.SysDeptUpdateRequest:
    properties:
      dept_name:
        description: 部门名称
        type: string
      email:
        description: 邮箱
        type: string
      id:
        type: integer
      leader:
        description: 负责人
        type: string
      order_num:
        description: 显示顺序
        type: integer
      parent_id:
        description: 父部门ID
        type: integer
      phone:
        description: 联系电话
        type: string
      remark:
        description: 备注
        type: string
      status:
        description: 部门状态（0正常 1停用）
        type: string
    required:
    - dept_name
    - id
    - order_num
    - parent_id
    - status
    type: object
  iot-alert-center_api_v1.SysMenuCreateRequest:
    properties:
      icon:
        description: 菜单图标
        type: string
      is_refresh:
        description: 是否刷新（0刷新 1不刷新）
        type: string
      menu_name:
        description: 菜单名称
        type: string
      menu_type:
        description: 菜单类型（M目录 C菜单 F按钮）
        type: string
      order_num:
        description: 显示顺序
        type: integer
      parent_id:
        description: 父菜单ID
        type: integer
      perms:
        description: 权限标识
        type: string
      remark:
        description: 备注
        type: string
      target:
        description: 打开方式
        type: string
      url:
        description: 请求地址
        type: string
      visible:
        description: 菜单状态（0显示 1隐藏）
        type: string
    required:
    - menu_name
    - menu_type
    - visible
    type: object
  iot-alert-center_api_v1.SysMenuUpdateRequest:
    properties:
      icon:
        description: 菜单图标
        type: string
      id:
        type: integer
